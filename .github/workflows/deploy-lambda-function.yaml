name: Deploy Lambda Function

on:
  workflow_call:
    secrets:
      ACCOUNT_ID:
        required: true

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  deploy-lambda:
    runs-on: ubuntu-latest
    env:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Lambda container image
        run: |
          docker pull ghcr.io/bblue530/backup_repo_lambda:latest

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/BBlue530-repovault-oidc
          aws-region: eu-north-1

      - name: Push image to ECR and Update Lambda
        run: |
          aws ecr describe-repositories --repository-names repo_backup_to_s3 || \
            aws ecr create-repository --repository-name repo_backup_to_s3

          docker login \
            --username AWS \
            --password $(aws ecr get-login-password --region eu-north-1) \
            $ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com

          docker tag ghcr.io/bblue530/backup_repo_lambda:latest \
            $ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/repo_backup_to_s3:latest

          docker push $ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/repo_backup_to_s3:latest

          aws lambda update-function-code \
            --function-name repo_backup_to_s3 \
            --image-uri $ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/repo_backup_to_s3:latest
